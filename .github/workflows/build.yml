name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Find and move files to root
        run: |
          $sub = Get-ChildItem -Directory | Where-Object { $_.Name -eq "sop-recorder" } | Select-Object -First 1
          if ($sub) {
            Get-ChildItem -Path $sub.FullName | Move-Item -Destination .
            Remove-Item $sub.FullName -Force -Recurse
          }
        shell: pwsh

      - name: Install dependencies
        run: npm install

      - name: Build renderer and main
        run: npx electron-vite build

      - name: List dist folder
        run: dir dist /s
        shell: cmd

      - name: Package with electron-builder
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
